name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to plan"
        required: false
        type: choice
        default: dev
        options:
          - dev
          - prod

permissions:
  id-token: write       # OIDC authentication
  contents: read
  pull-requests: write  # PR comments (plan + infracost)

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "eu-west-3"
  WORKING_DIR: "terraform/environments/${{ inputs.environment || 'dev' }}"

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt
        run: terraform fmt -check -recursive terraform/

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint (download ruleset AWS)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, lint]
    outputs:
      plan_output: ${{ steps.plan.outputs.stdout }}
      plan_status: ${{ steps.plan.outcome }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = `### Terraform Plan — \`${{ inputs.environment || 'dev' }}\` ${status}

            <details><summary>Show plan</summary>

            \`\`\`hcl
            ${process.env.PLAN}
            \`\`\`

            </details>

            > Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\``;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.body.startsWith('### Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Export plan as JSON (for Infracost)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform show -json tfplan > tfplan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ inputs.environment || 'dev' }}
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/tfplan.json
          retention-days: 5

  infracost:
    name: Infracost
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ inputs.environment || 'dev' }}

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost estimate
        run: |
          infracost breakdown \
            --path tfplan.json \
            --format json \
            --out-file infracost.json

      - name: Post Infracost comment on PR
        if: github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path infracost.json \
            --repo ${{ github.repository }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --behavior update
