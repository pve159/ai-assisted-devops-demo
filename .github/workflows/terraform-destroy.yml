name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Type DESTROY to confirm — this action is irreversible'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "eu-west-3"

jobs:
  guard:
    name: Confirmation check
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. You must type exactly: DESTROY"
            exit 1
          fi
          echo "✅ Confirmation accepted. Proceeding with destruction of ${{ github.event.inputs.environment }}."

  destroy:
    name: Terraform Destroy — ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: guard
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: terraform destroy
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform destroy -auto-approve
